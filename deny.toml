[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Bootstrap transitive advisories currently owned by the Rust crate slice.
    "RUSTSEC-2024-0436",
    "RUSTSEC-2026-0002",
]

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
