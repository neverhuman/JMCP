system = "JMCP"
version = 1
zone = []

[policy]
default = "manual"
generated_content_must_be_reproducible = true
generated_content_requires_marker = true

[[protected_zones]]
exception = "docs/generated/**"
path = "docs/**"
rule = "Human-authored documentation by default."

[[protected_zones]]
path = "paper/*.tex"
rule = "Final paper source is manually governed."

[[zones]]
allowed = true
kind = "documentation"
path = "docs/generated/**"
required_marker = "Generated by JMCP tooling; do not edit by hand."

[[zones]]
allowed = true
kind = "paper-build-output"
path = "paper/build/**"
required_marker = "Generated artifact."

[[zones]]
allowed = true
kind = "agent-report"
path = "agent/reports/**"
required_marker = "Generated by agent workflow."

[[zones]]
allowed = true
kind = "agent-scaffold"
path = ".agents/**"
required_marker = "Generated by JMCP tooling; do not edit by hand."

[[zones]]
allowed = true
kind = "build-artifact"
path = ".artifacts/**"
required_marker = "Generated artifact."
