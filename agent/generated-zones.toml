system = "JMCP"
version = 1

[policy]
default = "manual"
generated_content_must_be_reproducible = true
generated_content_requires_marker = true

[[protected_zones]]
exception = "docs/generated/**"
path = "docs/**"
rule = "Human-authored documentation by default."

[[protected_zones]]
path = "paper/*.tex"
rule = "Final paper source is manually governed."

[[zone]]
allowed = true
command = "just contract-drift"
kind = "event-contract"
path = "contracts/events/jcp-envelope.schema.json"
required_marker = "Generated by: just contract-drift. Source: schemas/jcp/1.0.0/jcp.schema.json. DO NOT EDIT BY HAND."
source = "schemas/jcp/1.0.0/jcp.schema.json -> contracts/events/jcp-envelope.schema.json"
