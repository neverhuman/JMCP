version = 1
system = "JMCP"
protocol = "JCP/1.0.0"
transport_profile = "JPCM"

[[lane]]
id = "architecture"
evidence = [
  "docs/architecture.md",
  "paper/jmcp-v1-architecture-security-reproducibility.tex"
]
required_claims = [
  "local production-shaped core",
  "embedded SQLite default",
  "in-process replayable event bus default",
  "Rust backend",
  "React dashboard",
  "Rust TUI",
  "Telegram text intake/approvals",
  "local Jankurai/Jeryu/Jekko adapters"
]

[[lane]]
id = "protocol"
evidence = [
  "docs/protocol-decisions.md",
  "agent/test-map.json"
]
required_claims = [
  "JMCP is the system",
  "JCP/1.0.0 is the protocol",
  "JPCM is the backbone/transport profile"
]

[[lane]]
id = "security"
evidence = [
  "docs/security.md",
  "agent/audit-policy.toml"
]
required_claims = [
  "approval gates for mutating operations",
  "audit records are non-secret",
  "replay does not duplicate side effects",
  "adapters cannot bypass policy"
]

[[lane]]
id = "reproducibility"
evidence = [
  "docs/testing.md",
  "docs/operations.md",
  "agent/generated-zones.toml"
]
required_claims = [
  "CI-local parity",
  "deterministic fixtures",
  "local defaults do not require remote services"
]

