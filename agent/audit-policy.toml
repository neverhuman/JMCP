[history]
dedupe = "consecutive-equivalent"
max_bytes = 1048576
max_rows = 500
mirror_env = "JANKURAI_HISTORY_MIRROR"
mirror_max_rows = 5000
mirror_required = false

[retention]
default = "local-project-retained"
export_format = "jsonl"
rotation = "operator-managed"

[rules]
disallow_raw_payload_logging_by_default = true
record_adapter_boundary_crossings = true
record_approval_decisions = true
record_policy_denials = true
record_replay_start_stop = true
redact_secret_fields = true

[scan]
excluded_paths = ["tips/", ".jankurai/", "services/"]

[smart_scan]
full_scan_interval_secs = 3600
roulette_rate = 0.1
