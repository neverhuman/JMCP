advisory_on = [
    "medium",
    "low",
]
fail_on = [
    "critical",
    "high",
]
minimum_score = 85
system = "JMCP"
version = 1

[classification]
public_fields = [
    "event_id",
    "correlation_id",
    "actor",
    "component",
    "operation",
    "decision",
    "timestamp",
    "diagnostic_class",
]
secret_fields = [
    "token",
    "password",
    "secret",
    "api_key",
    "authorization",
    "cookie",
]

