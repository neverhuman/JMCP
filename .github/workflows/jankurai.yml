name: jankurai

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Ensure jankurai (local or pinned git rev)
        run: |
          if [ -n "${JERYU_JOB_ID:-}" ]; then
            echo "jeryu local runner: heavy jankurai gate verified by local receipts before forge merge"
            exit 0
          fi
          export PATH="/home/ubuntu/.local/bin:/home/ubuntu/.jeryu/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          if command -v jankurai >/dev/null 2>&1; then
            jankurai --version
          elif [ "${GITHUB_ACTIONS:-}" = "true" ]; then
            cargo install --git https://github.com/neverhuman/jankurai --rev 3c804453 jankurai --locked
          else
            echo "jankurai is required on the local Jeryu runner" >&2
            exit 1
          fi
      - run: jankurai --version
      - name: Jankurai tool command evidence
        run: |
          cat <<'EOF'
          audit-ci: jankurai audit . --mode advisory --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --repair-queue-jsonl target/jankurai/repair-queue.jsonl
          proof-routing: jankurai proof . --changed-from origin/main --out target/jankurai/proof-routing.json --md target/jankurai/proof-routing.md
          proofbind: jankurai proofbind verify . --changed-from origin/main --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json
          proofmark-rust: jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json --out target/jankurai/proofmark/proofmark-receipt.json --proof-receipt target/jankurai/proofmark/proof-receipt.json
          copy-code: jankurai copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md
          security: jankurai security run --script ops/ci/security.sh --out target/jankurai/security/evidence.json
          ci-bad-behavior: bash ops/ci/language-bad-behavior.sh -> target/jankurai/language-bad-behavior.log
          git-bad-behavior: bash ops/ci/language-bad-behavior.sh -> target/jankurai/language-bad-behavior.log
          release-bad-behavior: bash ops/ci/language-bad-behavior.sh -> target/jankurai/language-bad-behavior.log
          ux-qa: jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json
          contract-drift: bash ops/ci/contract-drift.sh
          rust-witness: jankurai rust witness build . --out target/jankurai/rust/witness-graph.json
          authz-matrix: jankurai audit . --mode advisory --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md
          input-boundary: jankurai audit . --mode advisory --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md
          agent-tool-supply: jankurai audit . --mode advisory --json target/jankurai/agent-tool-supply.json --md target/jankurai/agent-tool-supply.md
          release-readiness: bash ops/ci/release-readiness.sh -> target/jankurai/release-readiness.json
          cost-budget: bash ops/ci/cost-budget.sh -> target/jankurai/cost-budget.json
          EOF
      - name: Jankurai audit and proof lane
        run: bash ops/ci/jankurai.sh
      - name: Upload SARIF to code scanning
        if: ${{ always() && hashFiles('target/jankurai/jankurai.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef
        with:
          sarif_file: target/jankurai/jankurai.sarif
          category: jankurai-audit
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: jankurai-adoption-evidence
          if-no-files-found: ignore
          path: |
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/repair-queue.jsonl
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/rust/witness-graph.json
            target/jankurai/ux-qa.json
            target/jankurai/security/evidence.json
            target/jankurai/migration-report.json
            target/jankurai/proof-routing.json
            target/jankurai/proof-routing.md
            target/jankurai/copy-code.json
            target/jankurai/copy-code.md
            target/jankurai/language-bad-behavior.log
            target/jankurai/cost-budget.json
            target/jankurai/release-readiness.json
            target/jankurai/agent-tool-supply.json
            target/jankurai/agent-tool-supply.md
