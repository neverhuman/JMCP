name: jankurai

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install jankurai (pinned git rev — supply-chain evidence)
        run: cargo install --git https://github.com/neverhuman/jankurai --rev 3c804453 jankurai --locked
      - run: jankurai --version
      - name: jankurai audit
        run: jankurai audit . --mode advisory --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl
      - name: Jankurai regression ratchet (advisory in CI; ops/git-hooks enforce locally)
        continue-on-error: true
        run: bash ops/ci/jankurai-ratchet.sh
      - name: Proofbind verify
        continue-on-error: true
        run: jankurai proofbind verify . --changed-from origin/main
      - name: Proofmark rust
        continue-on-error: true
        run: jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json
      - name: Rust witness build
        continue-on-error: true
        run: jankurai rust witness build .
      - name: UX QA smoke
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        continue-on-error: true
        run: jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json
      - name: Upload SARIF to code scanning
        if: ${{ always() && hashFiles('target/jankurai/jankurai.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef
        with:
          sarif_file: target/jankurai/jankurai.sarif
          category: jankurai-audit
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: jankurai-adoption-evidence
          if-no-files-found: ignore
          path: |
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/repair-queue.jsonl
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/rust/witness-graph.json
            target/jankurai/ux-qa.json
            target/jankurai/security/evidence.json
            target/jankurai/migration-report.json
