name: Security

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Ensure jankurai (local or pinned git rev)
        run: |
          export PATH="/home/ubuntu/.local/bin:/home/ubuntu/.jeryu/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          if command -v jankurai >/dev/null 2>&1; then
            jankurai --version
          elif [ "${GITHUB_ACTIONS:-}" = "true" ]; then
            cargo install --git https://github.com/neverhuman/jankurai --rev 3c804453 jankurai --locked
          else
            echo "jankurai is required on the local Jeryu runner" >&2
            exit 1
          fi
      - name: Fast gate
        run: bash ops/ci/fast.sh
      # gitleaks, cargo-audit, cargo-deny, npm audit, zizmor, and syft are
      # all executed by the local security wrapper so the workflow stays thin.
      - name: Security gate (gitleaks, cargo-audit, cargo-deny, npm audit, zizmor, syft)
        run: |
          printf '%s\n' gitleaks cargo-audit cargo-deny 'npm audit' zizmor syft
          jankurai security run --script ops/ci/security.sh --out target/jankurai/security/evidence.json
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-artifacts
          path: |
            .artifacts/security
            target/jankurai/security/evidence.json
          if-no-files-found: ignore
